[labels]
app.name = Go

notifications.topic.activity = Խաղի գործունեություն
notifications.topic.message = Հաղորդագրություններ

# Error messages used by a.error.label(...). Generated keys mirror
# the previous hardcoded a.error() literals.
errors.invalid_game_id = Անվավեր խաղի ID
errors.game_not_found = Խաղը չի գտնվել
errors.not_a_player_in_this_game = Այս խաղի խաղացող չէ
errors.invalid_opponent = Անվավեր հակառակորդ
errors.cannot_play_against_yourself = Չի կարելի խաղալ ինքն իր դեմ
errors.can_only_play_with_friends = Կարելի է խաղալ միայն ընկերների հետ
errors.invalid_board_size = Անվավեր տախտակի չափ
errors.invalid_komi = Անվավեր komi
errors.komi_must_be_between_0_and_10 = Komi-ն պետք է լինի 0-ի և 10-ի միջև
errors.invalid_message = Անվավեր հաղորդագրություն
errors.message_too_long = Հաղորդագրությունը շատ երկար է
errors.message_cannot_be_empty = Հաղորդագրությունը չի կարող դատարկ լինել
errors.game_is_not_active = Խաղն ակտիվ չէ
errors.not_your_turn = Ձեր հերթը չէ
errors.invalid_move_label = Անվավեր քայլի պիտակ
errors.invalid_board_state = Անվավեր տախտակի վիճակ
errors.invalid_previous_board_state = Անվավեր նախորդ տախտակի վիճակ
errors.sgf_too_long = SGF-ը շատ երկար է
errors.invalid_captures = Անվավեր գրավումներ
errors.invalid_score = Անվավեր միավոր
errors.you_already_offered_a_draw = Դուք արդեն առաջարկել եք ոչ-ոքի
errors.no_draw_offer_to_accept = Ոչ-ոքիի առաջարկ չկա ընդունելու համար
errors.no_draw_offer_to_decline = Ոչ-ոքիի առաջարկ չկա մերժելու համար
errors.cannot_delete_an_active_game = Չի կարելի ջնջել ակտիվ խաղ

# Notification titles and bodies. Recipient-side composition; resolved
# against the recipient's language at notify() time.
notifications.title.game = Go խաղ
notifications.title.move = Go քայլ
notifications.title.message = Go հաղորդագրություն
notifications.title.go = Go
notifications.body.started_game = {name}-ը սկսել է խաղ
notifications.body.played_move = {name}-ը խաղացել է {move}
